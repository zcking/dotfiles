palette = "databricks"

[palettes.databricks]
navy_900 = "#0B2026"
navy_800 = "#1B3139"
lava_600 = "#FF3621"  # Primary Accent
lava_500 = "#FF5F46"
oat_medium = "#EEEDE9" # Main Text
blue_600 = "#2272B4"   # Info/Directory
green_600 = "#00A972"  # Success
yellow_600 = "#FFAB00" # Warning

